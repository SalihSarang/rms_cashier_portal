name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cashier_portal

    steps:
      - name: Checkout cashier_portal
        uses: actions/checkout@v3
        with:
          path: cashier_portal

      - name: Checkout shared packages
        uses: actions/checkout@v3
        with:
          repository: SalihSarang/rms_packages
          path: packages
          # If private, you would add:
          # token: ${{ secrets.PACKAGES_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.8'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test
